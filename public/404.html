<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Miracle Beauty Care</title>
    <script>
      ;(function () {
        var path = window.location.pathname.replace(/\/index\.html$/, '') || '/'
        if (!path.startsWith('/')) path = '/' + path
        var hash = window.location.hash
        if (!hash || hash === '#') {
          hash = path === '/' ? '#/' : '#' + path
        }
        window.location.replace('/' + hash + window.location.search)
      })()
    </script>
  </head>
  <body></body>
</html>
